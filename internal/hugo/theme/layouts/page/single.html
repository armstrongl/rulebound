{{- define "main" -}}
<article class="page-content"{{ if ne .Params.pagefind false }} data-pagefind-body{{ end }}>
  <header class="page-header">
    <h1 data-pagefind-meta="title">{{ .Title }}</h1>
    {{- with .Description -}}
      <span data-pagefind-meta="description:{{ . }}" hidden></span>
    {{- end -}}
  </header>
  {{- with .Content -}}
    <section class="page-body">
      {{ . }}
    </section>
  {{- end -}}
</article>
{{- end -}}
