# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

builds:
  - main: .
    binary: rulebound
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/armstrongl/rulebound/cmd.Version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [README.md, LICENSE]

checksum:
  algorithm: sha256

changelog:
  use: git
  groups:
    - title: Features
      regexp: '^feat'
    - title: Bug Fixes
      regexp: '^fix'
    - title: Other
      order: 999

homebrew_casks:
  - name: rulebound
    binaries:
      - rulebound
    repository:
      owner: armstrongl
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/armstrongl/rulebound
    description: Generate static style guide websites from Vale linting packages
